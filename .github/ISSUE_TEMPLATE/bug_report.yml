name: 🐞 Bug report
description: Something is not working as it should
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
      placeholder: After a scan some sensors go missing...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Connect X sensors
        2. Flash the firmware
        3. Open http://192.168.4.1
    validations:
      required: true
  - type: input
    id: sensors
    attributes:
      label: Sensor count and bus length
      placeholder: "e.g. 30 sensors, ~5 m, 2.2 kΩ pull-up"
  - type: input
    id: board
    attributes:
      label: ESP32 board
      placeholder: "e.g. ESP32 DevKit v1"
  - type: textarea
    id: serial
    attributes:
      label: Serial monitor log (115200)
      render: text
