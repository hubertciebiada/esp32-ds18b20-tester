; PlatformIO - DS18B20 sensor tester on ESP32
; Build:   pio run
; Flash:   pio run -t upload
; Monitor: pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Libraries per the specification.
; ArduinoJson v7 (JsonDocument / to<JsonArray>() / add<JsonObject>() syntax).
; AsyncTCP + ESPAsyncWebServer from the ESP32Async organization (actively maintained forks).
lib_deps =
    paulstoffregen/OneWire @ ^2.3.7
    milesburton/DallasTemperature @ ^3.11.0
    bblanchon/ArduinoJson @ ^7.0.0
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.6.0
