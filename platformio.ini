; PlatformIO – tester czujników DS18B20 na ESP32
; Build:  pio run
; Flash:  pio run -t upload
; Monitor: pio device monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Biblioteki zgodnie ze specyfikacją.
; ArduinoJson w wersji 7 (składnia JsonDocument / to<JsonArray>() / add<JsonObject>()).
; AsyncTCP + ESPAsyncWebServer z organizacji ESP32Async (aktywnie utrzymywane forki).
lib_deps =
    paulstoffregen/OneWire @ ^2.3.7
    milesburton/DallasTemperature @ ^3.11.0
    bblanchon/ArduinoJson @ ^7.0.0
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.6.0
